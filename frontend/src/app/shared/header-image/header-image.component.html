<div class="header-image-wrapper" [dir]="(settings.rtl) ? 'rtl' : 'ltr'" [class.fullscreen]="fullscreen" [class]="'toolbar-'+settings.toolbar">
    <div class="bg" [style.background-image]="bgImage" [class.bg-anime]="bgImageAnimate"></div>
    <div class="mask"></div>   
    <div class="header-image-content" fxLayout="column" fxLayoutAlign="center center" [class.offset-bottom]="contentOffsetToTop" [class.home-page]="isHomePage"  [style.min-height.px]="contentMinHeight">
      @if (title) {
        <h1 class="title">{{title}}</h1>
      }  
      @if (desc) {
        <p class="desc">{{desc}}</p>
      }
      @if (isHomePage) {
        <div ngClass.gt-xs="mt-4" ngClass.xs="mt-3"> 
          <a mat-raised-button routerLink="/menu">{{ 'MENU' | translate }}</a>
          <a mat-raised-button color="primary" routerLink="/reservation">{{ 'RESERVATION' | translate }}</a> 
        </div>
      }       
    </div>
</div>
